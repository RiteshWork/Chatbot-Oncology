<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RelaxBot - Therapeutic Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header-info {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            opacity: 0.9;
        }

        .header-info div {
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
        }

        /* Ritesh added */
        .process-info {
            display: flex;
            justify-content: center; /* or space-around if you want */
            font-size: 12px;
            opacity: 0.9;
            margin-top: 8px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bot .message-content {
            background: #e8eaf6;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
            margin-top: 5px;
            font-weight: 600;
        }

        .emotion-badge {
            background: #fff3cd;
            color: #856404;
        }

        .step-badge {
            background: #d1ecf1;
            color: #0c5460;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            border-radius: 0 0 16px 16px;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Indicator */
        .loading {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
            margin: auto;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                max-width: 100%;
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }

            .header h1 {
                font-size: 20px;
            }

            .header-info {
                flex-direction: column;
                gap: 8px;
            }

            /* Ritesh added */
            .process-info {
                flex-direction: column;
                gap: 8px;
            }
            /* ------------- */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧘 RelaxBot</h1>
            <div class="header-info">
                <div>
                    <strong>Session:</strong>
                    <span id="sessionId">Creating...</span>
                </div>
                <div>
                    <strong>Step:</strong>
                    <span id="currentStep">Initializing...</span>
                </div>
                <div>
                    <strong>Emotion:</strong>
                    <span id="detectedEmotion">-</span>
                </div>
            </div>
            <!-- Ritesh added -->
            <div class="process-info">
                <div>
                    <strong>Process:</strong>
                    <span id="process_check">-</span>
                </div>
            </div>
            <!-- ------------- -->
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-message">
                <p>Initializing RelaxBot...</p>
                <p style="font-size: 12px; margin-top: 10px;">Please wait while we prepare your session.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Type your message..."
                    autocomplete="off"
                    disabled
                >
                <button id="sendButton" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:8000'; // Change if API is on different host/port
        let sessionId = null;
        let isLoading = false;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await initializeSession();
            setupEventListeners();
        });

        // Event listeners
        function setupEventListeners() {
            const userInput = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');

            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !isLoading) {
                    sendMessage();
                }
            });

            userInput.addEventListener('input', () => {
                sendButton.disabled = !userInput.value.trim() || isLoading;
            });
        }

        // Initialize session with bot
        async function initializeSession() {
            try {
                // Create session
                const sessionResponse = await fetch(`${API_BASE_URL}/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        patient_id: `patient_${Date.now()}`,
                        process_code: 'guided_imagery_v2'
                    })
                });

                if (!sessionResponse.ok) {
                    throw new Error('Failed to create session');
                }

                const sessionData = await sessionResponse.json();
                sessionId = sessionData.session_id;

                // Update header
                document.getElementById('sessionId').textContent = sessionId.slice(0, 8) + '...';

                // Clear welcome message
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = '';

                // Display Step 1 introduction directly (don't trigger cascading transitions)
                const step1Intro = "Hello, I'm RelaxBot, your therapeutic companion. I'm here to help you find moments of peace and relaxation through guided imagery. Before we begin this therapeutic journey, I'd like to understand your current state. How are you feeling right now?";

                addMessage(step1Intro, 'bot');

                // Update header to show Step 1
                document.getElementById('currentStep').textContent = 'Step 1: Introduction';

                // Enable input
                document.getElementById('userInput').disabled = false;
                document.getElementById('userInput').focus();
                document.getElementById('sendButton').disabled = true;

            } catch (error) {
                console.error('Error initializing session:', error);
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = `
                    <div class="welcome-message">
                        <p>❌ Error initializing session</p>
                        <p style="font-size: 12px; margin-top: 10px;">
                            Make sure the API is running at ${API_BASE_URL}
                        </p>
                        <p style="font-size: 11px; margin-top: 10px; color: #999;">
                            ${error.message}
                        </p>
                    </div>
                `;
            }
        }

        // Send user message
        async function sendMessage() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value.trim();

            if (!message || isLoading || !sessionId) return;

            isLoading = true;
            document.getElementById('sendButton').disabled = true;

            // Add user message to chat
            addMessage(message, 'user');
            userInput.value = '';

            // Show loading indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
            document.getElementById('chatArea').appendChild(loadingDiv);

            try {
                // Send message to API
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to get response');
                }

                const data = await response.json();

                // Remove loading indicator
                loadingDiv.remove();

                // Update UI with bot response
                updateUI(data);

            } catch (error) {
                console.error('Error sending message:', error);
                loadingDiv.remove();
                addMessage('Sorry, I encountered an error. Please try again.', 'bot');
            } finally {
                isLoading = false;
                document.getElementById('sendButton').disabled = false;
                document.getElementById('userInput').focus();
            }
        }

        // Add message to chat
        function addMessage(text, sender) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);

            // Auto-scroll to bottom
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Update UI with API response
        function updateUI(data) {
            // Add bot response
            if (data.llm_response) {
                addMessage(data.llm_response, 'bot');
            }

            // Update header info
            if (data.current_state) {
                document.getElementById('currentStep').textContent = data.current_state.state_name || 'Unknown';
            }

            if (data.emotion) {
                document.getElementById('detectedEmotion').textContent =
                    data.emotion.charAt(0).toUpperCase() + data.emotion.slice(1);
            }
            // Ritesh Oraon //
            if (data.process_text){
                document.getElementById('process_check').textContent = data.process_text;
            }
            ////
        }
    </script>
</body>
</html>
